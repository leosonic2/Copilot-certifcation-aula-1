<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers - CSV Grid</title>
    <link rel="stylesheet" href="customers-gui.css" />
</head>
<body>
    <main>
        <h1>Customer Data</h1>

        <div id="status" class="status">Loading...</div>

        <div class="table-wrapper">
            <table id="customersTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <fieldset id="addForm" class="add-form" disabled>
            <legend>Add new customer</legend>
            <div id="formFields" class="form-fields"></div>
            <button id="btnAdd" type="button">Add to grid</button>
        </fieldset>
    </main>

    <script src="ReadingFile.js"></script>
    <script src="customers-gui.js"></script>
</body>
</html>
